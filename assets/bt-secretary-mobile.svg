<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 420" role="img" aria-labelledby="btSecretaryTitle btSecretaryDesc">
  <title id="btSecretaryTitle">Comptaria — Agent BT Secretary Mobile</title>
  <desc id="btSecretaryDesc">Illustration d'un téléphone mobile affichant l'agent BT Secretary qui envoie des notifications comptables (conciliation, TPS/TVQ, factures fournisseurs, mémos CPA).</desc>

  <!-- Soft background halo -->
  <defs>
    <linearGradient id="bgHalo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e6f2f4"/>
      <stop offset="100%" stop-color="#f7f9fc"/>
    </linearGradient>
    <linearGradient id="phoneBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f3a5f"/>
      <stop offset="100%" stop-color="#0b2545"/>
    </linearGradient>
    <linearGradient id="phoneScreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7f9fc"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f7a8c"/>
      <stop offset="100%" stop-color="#0b2545"/>
    </linearGradient>
  </defs>

  <rect width="360" height="420" fill="url(#bgHalo)"/>

  <!-- Phone shadow -->
  <ellipse cx="180" cy="385" rx="110" ry="10" fill="#0b2545" opacity="0.10"/>

  <!-- Phone body -->
  <rect x="95" y="50" width="170" height="320" rx="22" ry="22" fill="url(#phoneBody)"/>
  <!-- Phone bezel highlight -->
  <rect x="95" y="50" width="170" height="320" rx="22" ry="22" fill="none" stroke="#0b2545" stroke-width="1" opacity="0.4"/>
  <!-- Side button -->
  <rect x="263" y="120" width="3" height="34" rx="1" fill="#0b2545"/>
  <rect x="263" y="170" width="3" height="22" rx="1" fill="#0b2545"/>

  <!-- Screen background -->
  <rect x="107" y="62" width="146" height="296" rx="14" ry="14" fill="url(#phoneScreen)"/>

  <!-- Notch / front camera -->
  <rect x="160" y="62" width="40" height="10" rx="5" fill="#0b2545"/>
  <circle cx="195" cy="67" r="1.6" fill="#1f7a8c"/>

  <!-- Status bar time -->
  <text x="118" y="86" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="7" fill="#0b2545" font-weight="600">9:41</text>
  <!-- Status bar icons (signal/wifi/battery) -->
  <g fill="#0b2545">
    <rect x="222" y="83" width="2" height="4"/>
    <rect x="225" y="82" width="2" height="5"/>
    <rect x="228" y="81" width="2" height="6"/>
    <rect x="232" y="80" width="2" height="7"/>
    <rect x="238" y="80" width="2" height="7"/>
    <rect x="241" y="79" width="2" height="8"/>
    <rect x="246" y="79.5" width="8" height="6" rx="1.2" fill="none" stroke="#0b2545" stroke-width="0.8"/>
    <rect x="247" y="80.5" width="5" height="4" fill="#0b2545"/>
  </g>

  <!-- App header -->
  <rect x="107" y="92" width="146" height="40" fill="#ffffff"/>
  <text x="117" y="110" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#0b2545">BT Secretary</text>
  <text x="117" y="121" font-family="Inter, system-ui, sans-serif" font-size="6.5" fill="#5a6a82">Comptaria · Montréal</text>
  <!-- Online dot -->
  <circle cx="245" cy="113" r="3" fill="#2e8b57"/>
  <circle cx="245" cy="113" r="3" fill="#2e8b57" opacity="0.3">
    <animate attributeName="r" values="3;6;3" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Accent under header -->
  <rect x="107" y="132" width="146" height="2" fill="url(#accentBar)"/>

  <!-- Notification: Conciliation terminée -->
  <rect x="115" y="142" width="130" height="32" rx="6" fill="#f7f9fc" stroke="#e3e9f2" stroke-width="0.6"/>
  <circle cx="125" cy="154" r="5" fill="#1f7a8c"/>
  <text x="125" y="156.5" font-family="Inter, system-ui, sans-serif" font-size="6.5" font-weight="700" fill="#ffffff" text-anchor="middle">C</text>
  <text x="135" y="153" font-family="Inter, system-ui, sans-serif" font-size="6.5" font-weight="600" fill="#0b2545">Conciliation terminée</text>
  <text x="135" y="162" font-family="Inter, system-ui, sans-serif" font-size="5.5" fill="#5a6a82">142 écritures · 0 écart résiduel</text>
  <text x="237" y="166" font-family="Inter, system-ui, sans-serif" font-size="5" fill="#5a6a82" text-anchor="end">il y a 2 min</text>

  <!-- Notification: TPS/TVQ -->
  <rect x="115" y="180" width="130" height="32" rx="6" fill="#f7f9fc" stroke="#e3e9f2" stroke-width="0.6"/>
  <circle cx="125" cy="192" r="5" fill="#bf4342"/>
  <text x="125" y="194.5" font-family="Inter, system-ui, sans-serif" font-size="6.5" font-weight="700" fill="#ffffff" text-anchor="middle">$</text>
  <text x="135" y="191" font-family="Inter, system-ui, sans-serif" font-size="6.5" font-weight="600" fill="#0b2545">TPS/TVQ — déclaration prête</text>
  <text x="135" y="200" font-family="Inter, system-ui, sans-serif" font-size="5.5" fill="#5a6a82">Période P2 · 4 218 $ à remettre</text>
  <text x="237" y="204" font-family="Inter, system-ui, sans-serif" font-size="5" fill="#5a6a82" text-anchor="end">il y a 18 min</text>

  <!-- Notification: Facture fournisseur -->
  <rect x="115" y="218" width="130" height="32" rx="6" fill="#f7f9fc" stroke="#e3e9f2" stroke-width="0.6"/>
  <circle cx="125" cy="230" r="5" fill="#0b2545"/>
  <text x="125" y="232.5" font-family="Inter, system-ui, sans-serif" font-size="6" font-weight="700" fill="#ffffff" text-anchor="middle">F</text>
  <text x="135" y="229" font-family="Inter, system-ui, sans-serif" font-size="6.5" font-weight="600" fill="#0b2545">Nouvelle facture OCR</text>
  <text x="135" y="238" font-family="Inter, system-ui, sans-serif" font-size="5.5" fill="#5a6a82">Fournisseur ABC · 1 240 $</text>
  <text x="237" y="242" font-family="Inter, system-ui, sans-serif" font-size="5" fill="#5a6a82" text-anchor="end">il y a 1 h</text>

  <!-- Notification: Mémo CPA -->
  <rect x="115" y="256" width="130" height="32" rx="6" fill="#e6f2f4" stroke="#1f7a8c" stroke-width="0.6"/>
  <circle cx="125" cy="268" r="5" fill="#1f7a8c"/>
  <text x="125" y="270.5" font-family="Inter, system-ui, sans-serif" font-size="6" font-weight="700" fill="#ffffff" text-anchor="middle">@</text>
  <text x="135" y="267" font-family="Inter, system-ui, sans-serif" font-size="6.5" font-weight="600" fill="#0b2545">Mémo du CPA pilote</text>
  <text x="135" y="276" font-family="Inter, system-ui, sans-serif" font-size="5.5" fill="#5a6a82">3 transactions à valider · &lt; 2 min</text>
  <text x="237" y="280" font-family="Inter, system-ui, sans-serif" font-size="5" fill="#1f7a8c" text-anchor="end" font-weight="600">Action</text>

  <!-- Quick action row -->
  <rect x="115" y="296" width="130" height="32" rx="6" fill="#0b2545"/>
  <text x="180" y="316" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="600" fill="#ffffff" text-anchor="middle">Ouvrir le cockpit →</text>

  <!-- Bottom home indicator -->
  <rect x="155" y="346" width="50" height="3" rx="1.5" fill="#0b2545" opacity="0.4"/>

  <!-- Floating accent notification badge (overlay) -->
  <g transform="translate(245, 95)">
    <circle r="13" fill="#bf4342"/>
    <text y="4.5" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>
    <circle r="13" fill="none" stroke="#bf4342" stroke-width="1.5" opacity="0.5">
      <animate attributeName="r" values="13;17;13" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Caption -->
  <text x="180" y="405" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#5a6a82" text-anchor="middle">L'agent vous réveille. Le CPA décide.</text>
</svg>
